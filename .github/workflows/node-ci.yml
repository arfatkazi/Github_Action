name: NODE CI
on:
  push:
    branches: [ main ]
     
  pull_request:
    branches: [ main ]
      
 
jobs:
  test-node:
    name: NODE CI
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      
        
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
