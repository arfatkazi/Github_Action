name: NODE CI
on:
  push:
    branches: [ main ]
     
  pull_request:
    branches: [ main ]
      
 
jobs:
  test-node:
    name: NODE ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: install packages
        run: npm init -y && npm install
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: echo "npm test done"
