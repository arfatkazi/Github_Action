name: Artifact Flow

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: create package
        run: |
          mkdir dist
          echo "package content" > dist/app.txt

      - name: upload package
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: dist/


  verify:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: downloaded/

      - name: verify content
        run: cat downloaded/app.txt





    
  
        
